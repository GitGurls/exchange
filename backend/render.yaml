services:
  - type: web
    name: tradex-backend
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false   # Your Vercel URL
